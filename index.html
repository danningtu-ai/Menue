<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>两人食光</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff7ed;
      margin: 0;
      padding: 40px;
      color: #333;
    }
    .card {
      max-width: 720px;
      margin: auto;
      background: white;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      color: #e76f51;
    }
    button {
      background: #e76f51;
      color: white;
      border: 0;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>两人食光</h1>
    <h2>一周吃什么</h2>
    <p>这里可以放你的菜单、食谱、随机推荐功能。</p>
    <button onclick="alert('今天吃番茄牛腩饭！')">随机推荐</button>
  </div>
</body>
</html>
